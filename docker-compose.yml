services:
  app:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
      - REDIS_ADDR=redis:6379
      - CACHE_TTL_MINUTES=10
      - RATE_LIMIT_RPS=10
      - LINK_CHECK_CONCURRENCY=20
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
